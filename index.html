<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stadga</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #020618; --fg: #f8fafc; --muted: #475569; --border: #1e293b; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: "Geist", -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    body::after {
      content: "";
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      opacity: 0.04;
      pointer-events: none;
      z-index: 0;
      animation: grain 0.8s steps(1) infinite;
    }

    .wordmark, .tagline, footer { position: relative; z-index: 1; }

    .wordmark {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 300;
      letter-spacing: -0.04em;
      color: var(--fg);
      line-height: 1;
      opacity: 0;
      animation: fadein 0.8s ease forwards;
    }
    .tagline {
      margin-top: 1.25rem;
      font-family: "Geist Mono", monospace;
      font-size: clamp(0.7rem, 2vw, 0.8rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadein 0.8s ease 0.3s forwards;
    }
    .cursor {
      display: inline-block;
      width: 1px;
      height: 0.85em;
      background: var(--muted);
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    footer {
      position: fixed;
      bottom: 2rem;
      font-family: "Geist Mono", monospace;
      font-size: 0.7rem;
      color: var(--border);
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadein 0.8s ease 0.6s forwards;
    }

    @keyframes fadein { to { opacity: 1; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes grain {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(-3%, -4%); }
      50%  { transform: translate(4%, 3%); }
      75%  { transform: translate(-4%, 3%); }
      100% { transform: translate(3%, -4%); }
    }
  </style>
</head>
<body>
  <h1 class="wordmark">stadga</h1>
  <p class="tagline">Compliance that runs itself<span class="cursor"></span></p>
  <footer>stadga.co</footer>
</body>
</html>
