<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stadga</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #020618;
      color: #f8fafc;
      font-family: "Geist", -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      overflow: hidden;
    }
    .aurora {
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      pointer-events: none;
      z-index: 0;
      filter: blur(40px);
    }
    .wordmark, .tagline, footer { position: relative; z-index: 1; }
    .wordmark {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 300;
      letter-spacing: -0.04em;
      color: #f8fafc;
      line-height: 1;
      opacity: 0;
      animation: fadein 0.8s ease forwards;
    }
    .tagline {
      margin-top: 1.25rem;
      font-family: "Geist Mono", monospace;
      font-size: clamp(0.7rem, 2vw, 0.8rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #475569;
      opacity: 0;
      animation: fadein 0.8s ease 0.3s forwards;
    }
    .cursor {
      display: inline-block;
      width: 1px;
      height: 0.85em;
      background: #475569;
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    footer {
      position: fixed;
      bottom: 2rem;
      font-family: "Geist Mono", monospace;
      font-size: 0.7rem;
      color: #1e293b;
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadein 0.8s ease 0.6s forwards;
    }
    @keyframes fadein { to { opacity: 1; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="aurora" id="aurora"></div>
  <h1 class="wordmark">stadga</h1>
  <p class="tagline">Compliance that runs itself<span class="cursor"></span></p>
  <footer>stadga.co</footer>
  <script>
    const aurora = document.getElementById("aurora");

    const orbs = [
      { x: 0.20, y: 0.60, r: "56, 20, 120",  base: 0.35, driftX: 0.7, driftY: 0.5, phase: 0.0 },
      { x: 0.80, y: 0.30, r: "15, 60, 140",  base: 0.30, driftX: 0.5, driftY: 0.8, phase: 2.1 },
      { x: 0.55, y: 0.80, r: "10, 80, 100",  base: 0.20, driftX: 0.9, driftY: 0.6, phase: 4.2 },
    ];

    let mx = 0.5, my = 0.5;

    window.addEventListener("mousemove", e => {
      mx = e.clientX / window.innerWidth;
      my = e.clientY / window.innerHeight;
    });

    function loop(t) {
      const s = t / 1000;
      const bg = orbs.map(o => {
        const px = (o.x + Math.sin(s * o.driftX * 0.12 + o.phase) * 0.06) * 100;
        const py = (o.y + Math.cos(s * o.driftY * 0.10 + o.phase) * 0.06) * 100;

        const dx = mx - o.x;
        const dy = my - o.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const boost = Math.max(0, 1 - dist / 0.35) * 0.45;
        const opacity = Math.min(o.base + boost, 0.85);

        return ;
      }).join(", ");

      aurora.style.background = bg;
      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
