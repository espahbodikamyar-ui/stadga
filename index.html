<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stadga</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #020618;
      color: #f8fafc;
      font-family: "Geist", -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      overflow: hidden;
    }

    .aurora {
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 60%, rgba(56, 20, 120, 0.35) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 30%, rgba(15, 60, 140, 0.3) 0%, transparent 70%),
        radial-gradient(ellipse 40% 50% at 55% 80%, rgba(10, 80, 100, 0.2) 0%, transparent 70%);
      animation: aurora 18s ease-in-out infinite alternate;
      filter: blur(40px);
    }

    .aurora-mouse {
      position: fixed;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(circle, rgba(70, 30, 160, 0.25) 0%, transparent 70%);
      filter: blur(60px);
      transform: translate(-50%, -50%);
      left: 50%;
      top: 50%;
    }

    @keyframes aurora {
      0%   { transform: translate(0%, 0%) scale(1); }
      25%  { transform: translate(3%, -4%) scale(1.03); }
      50%  { transform: translate(-4%, 3%) scale(0.97); }
      75%  { transform: translate(4%, 4%) scale(1.02); }
      100% { transform: translate(-3%, -3%) scale(1); }
    }

    .wordmark, .tagline, footer { position: relative; z-index: 1; }

    .wordmark {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 300;
      letter-spacing: -0.04em;
      color: #f8fafc;
      line-height: 1;
      opacity: 0;
      animation: fadein 0.8s ease forwards;
    }
    .tagline {
      margin-top: 1.25rem;
      font-family: "Geist Mono", monospace;
      font-size: clamp(0.7rem, 2vw, 0.8rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #475569;
      opacity: 0;
      animation: fadein 0.8s ease 0.3s forwards;
    }
    .cursor {
      display: inline-block;
      width: 1px;
      height: 0.85em;
      background: #475569;
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    footer {
      position: fixed;
      bottom: 2rem;
      font-family: "Geist Mono", monospace;
      font-size: 0.7rem;
      color: #1e293b;
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadein 0.8s ease 0.6s forwards;
    }
    @keyframes fadein { to { opacity: 1; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <div class="aurora-mouse" id="aurora-mouse"></div>
  <h1 class="wordmark">stadga</h1>
  <p class="tagline">Compliance that runs itself<span class="cursor"></span></p>
  <footer>stadga.co</footer>
  <script>
    const el = document.getElementById("aurora-mouse");
    let mx = window.innerWidth / 2;
    let my = window.innerHeight / 2;
    let gx = mx, gy = my;

    window.addEventListener("mousemove", e => {
      mx = e.clientX;
      my = e.clientY;
    });

    function lerp(a, b, t) { return a + (b - a) * t; }

    function loop() {
      gx = lerp(gx, mx, 0.03);
      gy = lerp(gy, my, 0.03);
      el.style.left = gx + "px";
      el.style.top = gy + "px";
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
