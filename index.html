<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stadga</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #020618;
      color: #f8fafc;
      font-family: "Geist", -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      overflow: hidden;
    }
    canvas {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 0;
    }
    .wordmark, .tagline, footer { position: relative; z-index: 1; }
    .wordmark {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 300;
      letter-spacing: -0.04em;
      color: #f8fafc;
      line-height: 1;
      opacity: 0;
      animation: fadein 0.8s ease forwards;
    }
    .tagline {
      margin-top: 1.25rem;
      font-family: "Geist Mono", monospace;
      font-size: clamp(0.7rem, 2vw, 0.8rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #475569;
      opacity: 0;
      animation: fadein 0.8s ease 0.3s forwards;
    }
    .cursor {
      display: inline-block;
      width: 1px;
      height: 0.85em;
      background: #475569;
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    footer {
      position: fixed;
      bottom: 2rem;
      font-family: "Geist Mono", monospace;
      font-size: 0.7rem;
      color: #1e293b;
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadein 0.8s ease 0.6s forwards;
    }
    @keyframes fadein { to { opacity: 1; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</head>
<body>
  <canvas id="rain"></canvas>
  <h1 class="wordmark">stadga</h1>
  <p class="tagline">Compliance that runs itself<span class="cursor"></span></p>
  <footer>stadga.co</footer>
  <script>
    var canvas = document.getElementById("rain");
    var ctx = canvas.getContext("2d");
    var COUNT = 80;
    var SIZE = 6;

    // Hue-shifted color ramps: head -> trail (cooler/darker toward shadow)
    // Each ramp: [head, t1, t2, t3, t4, t5]
    var RAMPS = [
      [ [110,70,240], [80,45,195], [55,28,150], [35,16,105], [20,8,65],  [10,4,30]  ],
      [ [50,110,220], [30,80,175], [18,55,130], [10,34,88],  [6,18,52],  [3,8,25]   ],
      [ [30,130,170], [18,100,135],[10,72,100], [6,48,68],   [3,28,40],  [1,12,18]  ],
      [ [90,40,210],  [65,24,165], [44,14,122], [28,8,82],   [16,4,48],  [7,2,22]   ],
    ];

    var pixels = [];

    function makePixel(randomY) {
      var rampIdx = Math.floor(Math.random() * RAMPS.length);
      var cols = Math.floor(canvas.width / SIZE);
      var rows = Math.floor(canvas.height / SIZE);
      return {
        x: Math.floor(Math.random() * cols) * SIZE,
        y: randomY ? Math.floor(Math.random() * rows) * SIZE : -SIZE,
        stepInterval: 18 + Math.floor(Math.random() * 30),
        timer: Math.floor(Math.random() * 30),
        pauseLeft: 0,
        ramp: RAMPS[rampIdx],
        trail: []
      };
    }

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function init() {
      pixels = [];
      for (var i = 0; i < COUNT; i++) {
        pixels.push(makePixel(true));
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (var i = 0; i < pixels.length; i++) {
        var p = pixels[i];

        for (var j = 0; j < p.trail.length; j++) {
          var t = p.trail[j];
          var c = p.ramp[j + 1];
          ctx.fillStyle = "rgb(" + c[0] + "," + c[1] + "," + c[2] + ")";
          ctx.fillRect(t.x, t.y, SIZE, SIZE);
        }

        var head = p.ramp[0];
        ctx.fillStyle = "rgb(" + head[0] + "," + head[1] + "," + head[2] + ")";
        ctx.fillRect(p.x, p.y, SIZE, SIZE);

        if (p.pauseLeft > 0) {
          p.pauseLeft--;
        } else {
          p.timer++;
          if (p.timer >= p.stepInterval) {
            p.trail.unshift({x: p.x, y: p.y});
            if (p.trail.length > 5) p.trail.pop();
            p.y += SIZE;
            p.timer = 0;
            if (Math.random() < 0.25) {
              p.pauseLeft = 20 + Math.floor(Math.random() * 50);
            }
          }
        }

        if (p.y > canvas.height) {
          pixels[i] = makePixel(false);
        }
      }

      requestAnimationFrame(draw);
    }

    resize();
    init();
    window.addEventListener("resize", function() { resize(); init(); });
    draw();
  </script>
</body>
</html>
