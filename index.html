<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stadga</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #020618;
      color: #f8fafc;
      font-family: "Geist", -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      overflow: hidden;
    }
    canvas {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 0;
    }
    .wordmark, .tagline, footer { position: relative; z-index: 1; }
    .wordmark {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 300;
      letter-spacing: -0.04em;
      color: #f8fafc;
      line-height: 1;
      opacity: 0;
      animation: fadein 0.8s ease forwards;
    }
    .tagline {
      margin-top: 1.25rem;
      font-family: "Geist Mono", monospace;
      font-size: clamp(0.7rem, 2vw, 0.8rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #475569;
      opacity: 0;
      animation: fadein 0.8s ease 0.3s forwards;
    }
    .cursor {
      display: inline-block;
      width: 1px;
      height: 0.85em;
      background: #475569;
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    footer {
      position: fixed;
      bottom: 2rem;
      font-family: "Geist Mono", monospace;
      font-size: 0.7rem;
      color: #1e293b;
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadein 0.8s ease 0.6s forwards;
    }
    @keyframes fadein { to { opacity: 1; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</head>
<body>
  <canvas id="rain"></canvas>
  <h1 class="wordmark">stadga</h1>
  <p class="tagline">Compliance that runs itself<span class="cursor"></span></p>
  <footer>stadga.co</footer>
  <script>
    var canvas = document.getElementById("rain");
    var ctx = canvas.getContext("2d");
    var COUNT = 80;
    var SIZE = 6;
    var COLORS = [
      [80, 40, 200],
      [30, 80, 180],
      [20, 100, 140],
      [60, 20, 160],
    ];

    var pixels = [];

    function makePixel(randomY) {
      var c = COLORS[Math.floor(Math.random() * COLORS.length)];
      var cols = Math.floor(canvas.width / SIZE);
      var rows = Math.floor(canvas.height / SIZE);
      return {
        x: Math.floor(Math.random() * cols) * SIZE,
        y: randomY ? Math.floor(Math.random() * rows) * SIZE : -SIZE,
        stepInterval: 18 + Math.floor(Math.random() * 30),
        timer: Math.floor(Math.random() * 30),
        pauseLeft: 0,
        opacity: 0.45 + Math.random() * 0.55,
        r: c[0], g: c[1], b: c[2]
      };
    }

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function init() {
      pixels = [];
      for (var i = 0; i < COUNT; i++) {
        pixels.push(makePixel(true));
      }
    }

    function draw() {
      ctx.fillStyle = "rgba(2,6,24,0.12)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (var i = 0; i < pixels.length; i++) {
        var p = pixels[i];
        ctx.fillStyle = "rgba(" + p.r + "," + p.g + "," + p.b + "," + p.opacity + ")";
        ctx.fillRect(p.x, p.y, SIZE, SIZE);

        if (p.pauseLeft > 0) {
          p.pauseLeft--;
        } else {
          p.timer++;
          if (p.timer >= p.stepInterval) {
            p.y += SIZE;
            p.timer = 0;
            if (Math.random() < 0.25) {
              p.pauseLeft = 20 + Math.floor(Math.random() * 50);
            }
          }
        }

        if (p.y > canvas.height) {
          pixels[i] = makePixel(false);
        }
      }

      requestAnimationFrame(draw);
    }

    resize();
    init();
    window.addEventListener("resize", function() { resize(); init(); });
    draw();
  </script>
</body>
</html>
