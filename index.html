<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stadga</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #020618;
      color: #f8fafc;
      font-family: "Geist", -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .wordmark {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 300;
      letter-spacing: -0.04em;
      color: #f8fafc;
      line-height: 1;
      opacity: 0;
      animation: fadein 0.8s ease forwards;
    }
    .tagline {
      margin-top: 1.25rem;
      font-family: "Geist Mono", monospace;
      font-size: clamp(0.7rem, 2vw, 0.8rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #475569;
      opacity: 0;
      animation: fadein 0.8s ease 0.3s forwards;
    }
    .cursor {
      display: inline-block;
      width: 1px;
      height: 0.85em;
      background: #475569;
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    footer {
      position: fixed;
      bottom: 2rem;
      font-family: "Geist Mono", monospace;
      font-size: 0.7rem;
      color: #1e293b;
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadein 0.8s ease 0.6s forwards;
    }
    @keyframes fadein { to { opacity: 1; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</head>
<body>
  <h1 class="wordmark">stadga</h1>
  <p class="tagline">Compliance that runs itself<span class="cursor"></span></p>
  <footer>stadga.co</footer>
</body>
</html>
